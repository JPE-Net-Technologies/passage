# Ensure you have task installed:
# https://taskfile.dev

version: '3'

vars:
  GREETING: Task is running!

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  clean:
    cmds:
      - rm -vrf dist
      - rm -vrf build

  build:app:
    cmds:
      - bun run build

  build:
    deps: [build:app]
    cmds:
      - docker build -t passage .

  test:
    deps: [launch]
    cmds:
      - defer: {task: teardown}
      - bun run test

  test:coverage:
    cmds:
      - bun run test:coverage

  test:watch:
    cmds:
      - bun run test:watch

  # Run the example deployment preset (federates the local Keycloak upstream).
  server:
    dir: examples/keycloak-basic
    cmds:
      - bun run start

  server:dev:
    dir: examples/keycloak-basic
    cmds:
      - bun run dev

  launch:
    dir: examples/keycloak-basic
    cmds:
      - docker-compose up -d

  teardown:
    dir: examples/keycloak-basic
    cmds:
      - docker-compose down

  docs:dev:
    desc: "Start the Next.js + Fumadocs docs dev server"
    cmds:
      - bun run docs:dev

  docs:build:
    desc: "Build the docs site (regenerates the TypeDoc API reference first)"
    cmds:
      - bun run docs:build

  docs:api:
    desc: "Regenerate the @passage/core API reference (TypeDoc)"
    cmds:
      - bun run docs:api

  # Future dev tool
#  dx-import-idea:
#    prompt: "This will overwrite existing JetBrains configs, are you sure?"
#    cmds:
#      - echo "Not implemented yet"

