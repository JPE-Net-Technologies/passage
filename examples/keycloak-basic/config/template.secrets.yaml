# Template secrets: ship PLAINTEXT placeholders here. On first boot the LocalKMS encrypts
# each `unencryptedValue` in place (rewriting it as `encryptedValue`) and writes the master
# key to the gitignored `kms-local.keystore`. Never commit a real secret or a keystore.
Secrets:
  - name: "UpstreamClientSecret"
    provider: "Passage.LocalKms"
    reference: "UpstreamClientSecret"
    unencryptedValue: "dev-upstream-client-secret"
