# Downstream client registry — the apps Passage issues tokens to.
# client_id + redirect_uri are validated exactly at /authorize (no open redirects).
clients:
  - client_id: "example-spa"
    client_type: public
    redirect_uris:
      - "http://localhost:8081/callback"
    post_logout_redirect_uris:
      - "http://localhost:8081/"
    allowed_scopes:
      - openid
      - profile
      - email
    pkce_required: true

  # A confidential client authenticates at /token and /revoke with a registered secret
  # (client_secret_basic or client_secret_post). `client_secret_ref` MUST match the `name`
  # of a Secrets entry below — that name is the key LocalKMS resolves the plaintext under.
  - client_id: "example-web"
    client_type: confidential
    redirect_uris:
      - "http://localhost:8082/callback"
    post_logout_redirect_uris:
      - "http://localhost:8082/"
    client_secret_ref: "ExampleWebClientSecret"
    allowed_scopes:
      - openid
      - profile
      - email
    allowed_grants:
      - authorization_code
      - refresh_token
